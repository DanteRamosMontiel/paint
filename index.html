<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Paint</title>
    <link rel="stylesheet" href="style.css">
    <link rel="shortcut icon" href="assets/favicon/paint.png" type="image/x-icon">
</head>

<body>
    <div class="header">
        <h1>Homemade Paint!</h1>
        <div class="container"> 
            <div class="color-selector">
                <input type="color" value="#dd00fa">
            </div>
            <div class="pallete">
                <div class="color black color-selected" data-color="black"></div>
                <div class="color white" data-color="white"></div>
                <div class="color red" data-color="red"></div>
                <div class="color green" data-color="green"></div>
                <div class="color blue" data-color="blue"></div>
                <div class="color yellow" data-color="yellow"></div>
                <div class="color orange" data-color="orange"></div>
                <div class="color pink" data-color="pink"></div>
            </div>
        </div>
        <div class="container">
            <div class="weight-selector">
                <p>Line Weight</p>
                <select name="line-weight">
                    <option value="1">12</option>
                    <option value="2">14</option>
                    <option value="3">16</option>
                    <option value="4">18</option>
                    <option value="5">20</option>
                    <option value="6">22</option>
                    <option value="7">24</option>
                    <option value="8">30</option>
                    <option value="10">45</option>
                    <option value="20">72</option>
                </select>
            </div>
            <div class="brushes">
                <div data-brushtype="circle" class="brush brush-selected">
                    <img src="assets/icons/circle.png" alt="circle">
                </div>
                <div data-brushtype="square" class="brush">
                    <img src="assets/icons/square.png" alt="square">
                </div>
                <div data-brushtype="line" class="brush">
                    <img src="assets/icons/line.png" alt="line">
                </div>
                <div data-brushtype="bucket" class="brush bucket">
                    <img src="assets/icons/bucket.png" alt="bucket">
                </div>
                <div data-brushtype="eraser" class="brush eraser">
                    <img src="assets/icons/eraser.png" alt="eraser">
                </div>
                <div data-brushtype="text" class="brush text">
                    <img src="assets/icons/text.png" alt="text">
                </div>
            </div>
        </div>
        <div class="fill-container">
            <p>Fill</p>
            <div class="fill">
                <div data-fill="" class="fill-item">
                    <img src="assets/icons/circle.png" alt="circle">
                </div>
                <div data-fill=" " class="fill-item fill-selected">
                    <img src="assets/icons/sphere.png" alt="sphere">
                </div>
            </div>
        </div>
        <div class="container funcs-container">
            <div class="funcs">
                <div class="func" data-tooltip="Delete">
                    <img src="assets/icons/close.png" alt="close">
                </div>
                <div class="func" data-tooltip="Save">
                    <img src="assets/icons/save.png" alt="save">
                </div>
                <div class="func" data-tooltip="Print">
                    <img src="assets/icons/print.png" alt="print">
                </div>
                <div class="func" data-tooltip="Undo">
                    <img src="assets/icons/back.png" alt="undo">
                </div>
                <div class="func" data-tooltip="Redo">
                    <img src="assets/icons/redo.png" alt="redo">
                </div>
                <div class="func" data-tooltip="Paste">
                    <img src="assets/icons/paste.png" alt="paste">
                </div>
            </div>
        </div>
    </div>
    <canvas class="canvas"></canvas>
    <canvas class="preview-canvas"></canvas>
    <div class="footer">
        <img src="assets/icons/clic.png " alt="pointer" class="pointer">
        <p class="position">640, 786 px</p>
    </div>
    <script src="main.js"></script>
</body>

</html>
