<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Paint</title>
    <link rel="stylesheet" href="style.css">
</head>

<body>
    <div class="header">
        <div class="container">
            <div class="weight-selector">
                <p>Line Weight</p>
                <select name="line-weight">
                    <option value="0">12</option>
                    <option value="1">14</option>
                    <option value="2">16</option>
                    <option value="3">18</option>
                    <option value="4">20</option>
                    <option value="5">22</option>
                    <option value="6">24</option>
                    <option value="7">30</option>
                    <option value="8">45</option>
                    <option value="9">72</option>
                </select>
            </div>
            <div class="brushes">
                <div class="brush brush-selected">
                    <img src="assets/icons/circle.png" alt="circle">
                </div>
                <div class="brush">
                    <img src="assets/icons/square.png" alt="square">
                </div>
                <div class="brush">
                    <img src="assets/icons/line.png" alt="line">
                </div>
                <div class="brush bucket">
                    <img src="assets/icons/bucket.png" alt="bucket">
                </div>
                <div class="brush eraser">
                    <img src="assets/icons/eraser.png" alt="eraser">
                </div>
                <div class="brush text">
                    <img src="assets/icons/text.png" alt="text">
                </div>
            </div>
        </div>
        <div class="container">
            <div class="color-selector">
                <input type="color" value="#dd00fa">
            </div>
            <div class="pallete">
                <div class="color black color-selected"></div>
                <div class="color white"></div>
                <div class="color red"></div>
                <div class="color green"></div>
                <div class="color blue"></div>
                <div class="color yellow"></div>
                <div class="color orange"></div>
                <div class="color pink"></div>
            </div>
        </div>
    </div>
    <div class="board">
        <canvas class="canvas"></canvas>
    </div>
    <div class="footer">
        <img src="assets/icons/clic.png " alt="pointer" class="pointer">
        <p class="position">640, 786 px</p>
    </div>
    <script src="main.js"></script>
</body>

</html>
